{% from 'macros/buttons.html' import collapse_toggle %}
            <!-- Reporter Configuration - Collapsible -->
            <div class="border border-dark-border rounded-lg overflow-hidden">
                {{ collapse_toggle('Reporter Configuration', toggle_attr='data-accordion-toggle') }}
                <div class="hidden p-3 space-y-3 bg-dark-bg-primary">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label text-xs" for="report_interval">
                                Report Interval (s)
                                <span class="text-xs text-dark-text-muted font-normal">(default: 10s)</span>
                            </label>
                            <input
                                type="number"
                                id="report_interval"
                                name="report_interval"
                                value="{{ agent.report_interval if agent.report_interval is not none else '' }}"
                                class="input input-sm font-mono text-sm"
                                placeholder="10"
                                min="1"
                                max="300"
                            >
                        </div>
                        <div>
                            <label class="label text-xs" for="report_batch_size">
                                Batch Size
                                <span class="text-xs text-dark-text-muted font-normal">(default: 5000)</span>
                            </label>
                            <input
                                type="number"
                                id="report_batch_size"
                                name="report_batch_size"
                                value="{{ agent.report_batch_size if agent.report_batch_size is not none else '' }}"
                                class="input input-sm font-mono text-sm"
                                placeholder="5000"
                                min="10"
                                max="50000"
                            >
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label text-xs" for="report_process_interval">
                                Process Interval (s)
                                <span class="text-xs text-dark-text-muted font-normal">(default: 10s)</span>
                            </label>
                            <input
                                type="number"
                                id="report_process_interval"
                                name="report_process_interval"
                                value="{{ agent.report_process_interval if agent.report_process_interval is not none else '' }}"
                                class="input input-sm font-mono text-sm"
                                placeholder="10"
                                min="1"
                                max="300"
                            >
                        </div>
                        <div>
                            <label class="label text-xs" for="report_max_files_per_batch">
                                Max Files/Batch
                                <span class="text-xs text-dark-text-muted font-normal">(default: 5)</span>
                            </label>
                            <input
                                type="number"
                                id="report_max_files_per_batch"
                                name="report_max_files_per_batch"
                                value="{{ agent.report_max_files_per_batch if agent.report_max_files_per_batch is not none else '' }}"
                                class="input input-sm font-mono text-sm"
                                placeholder="5"
                                min="1"
                                max="100"
                            >
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label text-xs" for="report_max_queue_size">
                                Max Queue Size
                                <span class="text-xs text-dark-text-muted font-normal">(default: 5000)</span>
                            </label>
                            <input
                                type="number"
                                id="report_max_queue_size"
                                name="report_max_queue_size"
                                value="{{ agent.report_max_queue_size if agent.report_max_queue_size is not none else '' }}"
                                class="input input-sm font-mono text-sm"
                                placeholder="5000"
                                min="100"
                                max="50000"
                            >
                        </div>
                        <div>
                            <label class="label text-xs" for="report_backpressure_threshold">
                                Backpressure (0.0-1.0)
                                <span class="text-xs text-dark-text-muted font-normal">(default: 0.8)</span>
                            </label>
                            <input
                                type="number"
                                id="report_backpressure_threshold"
                                name="report_backpressure_threshold"
                                value="{{ agent.report_backpressure_threshold if agent.report_backpressure_threshold is not none else '' }}"
                                class="input input-sm font-mono text-sm"
                                placeholder="0.8"
                                step="0.1"
                                min="0.1"
                                max="1.0"
                            >
                        </div>
                    </div>
                </div>
            </div>
