{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center">
        <span class="w-24 h-24 mx-auto text-red-400 mb-8 inline-flex [&>svg]:w-full [&>svg]:h-full">{% include "icons/hero/outline/exclamation-triangle.svg" %}</span>
        <h1 class="text-4xl font-bold text-dark-text-primary mb-4">Oops! Something went wrong</h1>
        <p class="text-lg text-dark-text-secondary mb-8">{{ error }}</p>
        <a href="/" class="btn-primary">
            Back to Status
        </a>
    </div>
</div>
{% endblock %}
