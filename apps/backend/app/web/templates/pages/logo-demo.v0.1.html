<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxSwirl Logo Animation - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #ffffff;
            padding: 2rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
        }

        .canvas-section {
            flex-shrink: 0;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #ff3300;
            text-shadow: 0 0 20px rgba(255, 51, 0, 0.5);
            letter-spacing: 0.1em;
            text-align: center;
        }

        #canvas-container {
            width: 600px;
            height: 600px;
            filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.6));
            margin-bottom: 1rem;
        }

        .controls-section {
            flex: 1;
            overflow-y: auto;
            max-height: 90vh;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 51, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-group h3 {
            color: #ff6633;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255, 51, 0, 0.2);
            padding-bottom: 0.5rem;
        }

        .control-item {
            margin-bottom: 1rem;
        }

        .control-item label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
            color: #aaaaaa;
        }

        .control-item .value {
            color: #ff6633;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: #ff3300;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 51, 0, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #ff3300;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 51, 0, 0.5);
            border: none;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            background: transparent;
            border: 1px solid rgba(255, 51, 0, 0.3);
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff3300;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 51, 0, 0.2);
            border: 1px solid rgba(255, 51, 0, 0.5);
            border-radius: 5px;
            color: #ff6633;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-link:hover {
            background: rgba(255, 51, 0, 0.3);
            color: #ff9966;
        }

        .info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 5px;
            font-size: 0.8rem;
            color: #888;
        }

        .info code {
            color: #ff6633;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back to Dashboard</a>

    <div class="container">
        <div class="canvas-section">
            <h1>SWIRL LOGO</h1>
            <div id="canvas-container"></div>
        </div>

        <div class="controls-section">
            <div class="controls">
                <h2 style="color: #ff3300; margin-bottom: 1rem; font-size: 1.2rem;">Animation Controls</h2>

                <!-- Sphere Controls -->
                <div class="control-group">
                    <h3>Sphere</h3>

                    <div class="control-item">
                        <label>
                            <span>Vertices (Wireframe Detail)</span>
                            <span class="value" id="vertices-value">28</span>
                        </label>
                        <input type="range" id="vertices" min="8" max="64" step="4" value="28">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Size</span>
                            <span class="value" id="sphereSize-value">1.7</span>
                        </label>
                        <input type="range" id="sphereSize" min="0.5" max="3.0" step="0.1" value="1.7">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Rotation Speed</span>
                            <span class="value" id="rotationSpeed-value">0.001</span>
                        </label>
                        <input type="range" id="rotationSpeed" min="0" max="0.02" step="0.001" value="0.001">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Pulse Amount (Growth)</span>
                            <span class="value" id="pulseAmount-value">0.03</span>
                        </label>
                        <input type="range" id="pulseAmount" min="0" max="0.3" step="0.01" value="0.03">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Pulse Speed</span>
                            <span class="value" id="pulseSpeed-value">2.7</span>
                        </label>
                        <input type="range" id="pulseSpeed" min="0.5" max="5.0" step="0.1" value="2.7">
                    </div>
                </div>

                <!-- Opacity Controls -->
                <div class="control-group">
                    <h3>Opacity & Visibility</h3>

                    <div class="control-item">
                        <label>
                            <span>Wireframe Opacity</span>
                            <span class="value" id="wireframeOpacity-value">0.90</span>
                        </label>
                        <input type="range" id="wireframeOpacity" min="0" max="1" step="0.05" value="0.9">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Transparency (0=Solid, 1=See Through)</span>
                            <span class="value" id="backsideOpacity-value">0.40</span>
                        </label>
                        <input type="range" id="backsideOpacity" min="0" max="1" step="0.05" value="0.4">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Glow Intensity</span>
                            <span class="value" id="glowIntensity-value">0.25</span>
                        </label>
                        <input type="range" id="glowIntensity" min="0" max="1" step="0.05" value="0.25">
                    </div>
                </div>

                <!-- Color Controls -->
                <div class="control-group">
                    <h3>Colors</h3>

                    <div class="control-item">
                        <label>
                            <span>Primary Color (Sphere)</span>
                        </label>
                        <input type="color" id="primaryColor" value="#ff3300">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Secondary Color (Comets)</span>
                        </label>
                        <input type="color" id="secondaryColor" value="#ff6633">
                    </div>

                    <div class="control-item">
                        <div class="checkbox-group">
                            <input type="checkbox" id="useGradient">
                            <label for="useGradient">Use Gradient on Trails</label>
                        </div>
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Gradient Color (Trail End)</span>
                        </label>
                        <input type="color" id="gradientColor" value="#ff9900">
                    </div>
                </div>

                <!-- Comet Controls -->
                <div class="control-group">
                    <h3>Comets</h3>

                    <div class="control-item">
                        <label>
                            <span>Number of Comets</span>
                            <span class="value" id="cometCount-value">5</span>
                        </label>
                        <input type="range" id="cometCount" min="0" max="20" step="1" value="5">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Comet Speed</span>
                            <span class="value" id="cometSpeed-value">0.5</span>
                        </label>
                        <input type="range" id="cometSpeed" min="0" max="2.0" step="0.1" value="0.5">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Comet Size</span>
                            <span class="value" id="cometSize-value">0.08</span>
                        </label>
                        <input type="range" id="cometSize" min="0.02" max="0.3" step="0.01" value="0.08">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Trail Length</span>
                            <span class="value" id="trailLength-value">100</span>
                        </label>
                        <input type="range" id="trailLength" min="10" max="300" step="10" value="100">
                    </div>
                </div>

                <!-- Camera Controls -->
                <div class="control-group">
                    <h3>Camera</h3>

                    <div class="control-item">
                        <label>
                            <span>Camera Distance (Zoom)</span>
                            <span class="value" id="cameraDistance-value">5.0</span>
                        </label>
                        <input type="range" id="cameraDistance" min="2" max="10" step="0.5" value="5.0">
                    </div>

                    <div class="control-item">
                        <label>
                            <span>Camera Orbit Speed</span>
                            <span class="value" id="cameraOrbitSpeed-value">0.3</span>
                        </label>
                        <input type="range" id="cameraOrbitSpeed" min="0" max="1.0" step="0.05" value="0.3">
                    </div>
                </div>

                <div class="info">
                    <p><strong>Tip:</strong> Play with these settings to find your perfect look!</p>
                    <p>Edit the code:</p>
                    <p>• JavaScript: <code>/web/static/js/logo-animation.js</code></p>
                    <p>• HTML: <code>/web/templates/pages/logo-demo.html</code></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initLogo } from '/static/js/logo-animation.js';

        // Initialize logo and get controller
        const logoController = initLogo('canvas-container');

        // Setup all controls
        const controls = [
            'vertices', 'sphereSize', 'rotationSpeed', 'pulseAmount', 'pulseSpeed',
            'wireframeOpacity', 'backsideOpacity', 'glowIntensity',
            'primaryColor', 'secondaryColor', 'useGradient', 'gradientColor',
            'cometCount', 'cometSpeed', 'cometSize', 'trailLength',
            'cameraDistance', 'cameraOrbitSpeed'
        ];

        controls.forEach(controlId => {
            const input = document.getElementById(controlId);
            const valueDisplay = document.getElementById(`${controlId}-value`);

            if (input && input.type !== 'checkbox' && input.type !== 'color') {
                // Range sliders
                input.addEventListener('input', (e) => {
                    const value = parseFloat(e.target.value);
                    if (valueDisplay) {
                        valueDisplay.textContent = value;
                    }
                    logoController.updateConfig({ [controlId]: value });
                });
            } else if (input && input.type === 'color') {
                // Color pickers
                input.addEventListener('input', (e) => {
                    logoController.updateConfig({ [controlId]: e.target.value });
                });
            } else if (input && input.type === 'checkbox') {
                // Checkboxes
                input.addEventListener('change', (e) => {
                    logoController.updateConfig({ [controlId]: e.target.checked });
                });
            }
        });
    </script>
</body>
</html>
